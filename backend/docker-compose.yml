version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: y_social_db
    environment:
      POSTGRES_DB: y_social_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - y_social_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: y_social_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  y_social_pg_data:
